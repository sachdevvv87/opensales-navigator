databases:
  - name: opensales-db
    plan: free
    databaseName: opensales
    user: opensales

services:
  # ── API (Fastify) ────────────────────────────────────────────────────────────
  - type: web
    name: opensales-api
    runtime: node
    plan: free
    buildCommand: >-
      npm install -g pnpm@9 &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @opensales/database db:generate &&
      pnpm --filter @opensales/api build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: opensales-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        fromService:
          name: opensales-web
          type: web
          property: url
      - key: LOG_LEVEL
        value: info
      - key: HOST
        value: 0.0.0.0
    preDeployCommand: >-
      pnpm --filter @opensales/database exec
      prisma db push --skip-generate --accept-data-loss &&
      pnpm --filter @opensales/database exec
      tsx src/seed.ts

  # ── Web (Next.js) ────────────────────────────────────────────────────────────
  - type: web
    name: opensales-web
    runtime: node
    plan: free
    buildCommand: >-
      npm install -g pnpm@9 &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @opensales/web build
    startCommand: pnpm --filter @opensales/web exec next start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: opensales-api
          type: web
          property: url
