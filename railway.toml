[build]
builder = "nixpacks"

[[services]]
name = "api"
source = "apps/api"

[services.build]
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @opensales/database db:generate && pnpm --filter @opensales/api build"

[services.deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 60

[[services]]
name = "web"
source = "apps/web"

[services.build]
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @opensales/web build"

[services.deploy]
startCommand = "node apps/web/.next/standalone/server.js"

[[services]]
name = "worker"
source = "apps/worker"

[services.build]
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @opensales/database db:generate && pnpm --filter @opensales/worker build"

[services.deploy]
startCommand = "node apps/worker/dist/index.js"
